<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060810;
    --surface: #0d1117;
    --surface2: #161b22;
    --border: #21262d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #f78166;
    --accent4: #d2a8ff;
    --text: #e6edf3;
    --muted: #7d8590;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 36px;
    border-bottom: 1px solid var(--border);
    background: rgba(6,8,16,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.03em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent4));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .back-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    text-decoration: none;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--text); }

  /* Main area */
  .main {
    padding: 36px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 48px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    background: var(--surface);
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(88,166,255,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(88,166,255,0.04);
  }

  .upload-zone.loaded {
    border-style: solid;
    border-color: var(--accent2);
    background: rgba(63,185,80,0.04);
    padding: 24px;
  }

  .upload-icon { font-size: 44px; margin-bottom: 16px; }
  .upload-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .upload-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .upload-btn {
    display: inline-block;
    margin-top: 20px;
    background: var(--accent);
    color: var(--bg);
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
  }

  input[type="file"] { display: none; }

  /* File info bar */
  .file-info {
    display: none;
    align-items: center;
    gap: 14px;
    background: rgba(63,185,80,0.08);
    border: 1px solid rgba(63,185,80,0.2);
    border-radius: 10px;
    padding: 12px 18px;
    margin-bottom: 20px;
  }

  .file-info.show { display: flex; }

  .file-icon { font-size: 24px; }
  .file-name { font-weight: 500; font-size: 14px; }
  .file-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Analysis question */
  .ask-row {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
  }

  .ask-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 14px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .ask-input:focus { border-color: var(--accent); }
  .ask-input::placeholder { color: var(--muted); }

  .ask-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ask-btn:hover { filter: brightness(1.1); }
  .ask-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Quick analysis chips */
  .quick-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }

  /* Grid */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  /* Panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
  }

  .panel-badge {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--muted);
  }

  /* Stats cards */
  .stat-mini {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-mini::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-mini:nth-child(1)::after { background: var(--accent); }
  .stat-mini:nth-child(2)::after { background: var(--accent2); }
  .stat-mini:nth-child(3)::after { background: var(--accent3); }

  .stat-mini-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .stat-mini-value {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
  }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    padding: 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    background: var(--surface2);
    padding: 10px 14px;
    text-align: left;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 9px 14px;
    border-bottom: 1px solid rgba(33,38,45,0.5);
    color: var(--text);
    font-size: 12px;
    white-space: nowrap;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  tr:hover td { background: rgba(88,166,255,0.04); }

  /* Chart bars */
  .chart-area {
    padding: 20px 18px;
  }

  .chart-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .chart-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 100px;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 0;
  }

  .chart-bar-wrap {
    flex: 1;
    height: 24px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }

  .chart-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s ease;
    display: flex;
    align-items: center;
    padding-left: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--bg);
    font-weight: 500;
  }

  /* AI analysis output */
  .ai-output {
    padding: 20px 22px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    font-weight: 300;
  }

  .ai-output .ai-section {
    margin-bottom: 18px;
  }

  .ai-section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .ai-section-body {
    font-size: 13px;
    line-height: 1.8;
    color: #a8b4c0;
    white-space: pre-wrap;
  }

  /* Empty/loading states */
  .empty-panel {
    padding: 40px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    font-weight: 300;
  }

  .mini-spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(6,8,16,0.3);
    border-top-color: var(--bg);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--accent2);
    color: var(--bg);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Fade in */
  .fade-in { animation: fadeIn 0.4s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">📊</div>
    CSV 분석기
  </div>
  <a class="back-btn" href="index.html">← 대시보드로</a>
</div>

<div class="main">

  <!-- Upload zone -->
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()"
    ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
    <div id="uploadDefault">
      <div class="upload-icon">📂</div>
      <div class="upload-title">CSV 파일을 올려주세요</div>
      <div class="upload-sub">드래그 앤 드롭 또는 클릭하여 파일 선택<br>UTF-8, EUC-KR 인코딩 지원</div>
      <div class="upload-btn">파일 선택하기</div>
    </div>
    <div id="uploadLoaded" style="display:none;">
      <div style="font-size:32px; margin-bottom:8px;">✅</div>
      <div style="font-family:'Syne',sans-serif; font-weight:700; font-size:16px;" id="loadedName"></div>
      <div style="font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); margin-top:6px;" id="loadedMeta"></div>
      <div style="margin-top:12px; font-size:12px; color:var(--muted);">클릭하여 다른 파일 선택</div>
    </div>
    <input type="file" id="fileInput" accept=".csv" onchange="handleFileSelect(event)">
  </div>

  <!-- Ask question row -->
  <div class="ask-row">
    <input class="ask-input" id="askInput" placeholder="💬 이 데이터에 대해 물어보세요 — 예: 가장 높은 매출을 기록한 항목은 무엇인가요?" />
    <button class="ask-btn" id="askBtn" onclick="askQuestion()" disabled>
      <span id="askBtnSpinner" style="display:none;"><div class="mini-spinner"></div></span>
      ✨ 분석하기
    </button>
  </div>

  <!-- Quick chips -->
  <div class="quick-chips" id="quickChips">
    <span class="chip" onclick="setQuestion('전체 데이터를 요약해줘')">📋 전체 요약</span>
    <span class="chip" onclick="setQuestion('주요 트렌드와 패턴을 분석해줘')">📈 트렌드 분석</span>
    <span class="chip" onclick="setQuestion('이상값(outlier)이나 특이한 데이터가 있는지 찾아줘')">🔍 이상값 탐지</span>
    <span class="chip" onclick="setQuestion('상위 10개 항목을 알려줘')">🏆 상위 항목</span>
    <span class="chip" onclick="setQuestion('데이터 기반으로 비즈니스 인사이트와 제언을 제공해줘')">💡 비즈니스 인사이트</span>
  </div>

  <!-- Stats row (hidden initially) -->
  <div class="grid-3" id="statsRow" style="display:none;">
    <div class="stat-mini">
      <div class="stat-mini-label">총 행 수</div>
      <div class="stat-mini-value" id="statRows">—</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-label">총 열 수</div>
      <div class="stat-mini-value" id="statCols">—</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-label">데이터 포인트</div>
      <div class="stat-mini-value" id="statPoints">—</div>
    </div>
  </div>

  <!-- Grid: table + chart -->
  <div class="grid-2" id="dataGrid" style="display:none;">
    <!-- Preview table -->
    <div class="panel">
      <div class="panel-header">
        <span>📋</span>
        <div class="panel-title">데이터 미리보기</div>
        <div class="panel-badge" id="previewBadge">처음 10행</div>
      </div>
      <div class="table-wrap" id="tableWrap">
        <div class="empty-panel">파일을 업로드하면 데이터가 표시됩니다</div>
      </div>
    </div>

    <!-- Auto chart -->
    <div class="panel">
      <div class="panel-header">
        <span>📊</span>
        <div class="panel-title">자동 차트</div>
        <div class="panel-badge" id="chartBadge">상위 값 분포</div>
      </div>
      <div class="chart-area" id="chartArea">
        <div class="empty-panel">데이터를 업로드하면 자동으로 차트가 생성됩니다</div>
      </div>
    </div>
  </div>

  <!-- AI analysis panel -->
  <div class="panel" id="aiPanel" style="display:none;">
    <div class="panel-header">
      <span>🤖</span>
      <div class="panel-title">AI 분석 결과</div>
      <div class="panel-badge" id="aiQuestion">—</div>
    </div>
    <div id="aiOutput" class="ai-output">
      <div class="empty-panel">질문을 입력하고 분석하기를 눌러주세요</div>
    </div>
  </div>

</div>

<div class="toast" id="toast">✓ 완료</div>

<script>
  let csvData = [];
  let headers = [];
  let rawCSV = '';

  function handleDragOver(e) {
    e.preventDefault();
    document.getElementById('uploadZone').classList.add('dragover');
  }

  function handleDragLeave(e) {
    document.getElementById('uploadZone').classList.remove('dragover');
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('uploadZone').classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.csv')) processFile(file);
  }

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) processFile(file);
  }

  function processFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      rawCSV = e.target.result;
      parseCSV(rawCSV, file.name, file.size);
    };
    reader.readAsText(file, 'UTF-8');
  }

  function parseCSV(text, name, size) {
    const lines = text.trim().split('\n');
    headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
    csvData = lines.slice(1).map(line => {
      const vals = line.split(',').map(v => v.trim().replace(/"/g, ''));
      const row = {};
      headers.forEach((h, i) => row[h] = vals[i] || '');
      return row;
    }).filter(row => Object.values(row).some(v => v));

    // Update upload UI
    document.getElementById('uploadDefault').style.display = 'none';
    document.getElementById('uploadLoaded').style.display = 'block';
    document.getElementById('loadedName').textContent = name;
    document.getElementById('loadedMeta').textContent = `${csvData.length}행 × ${headers.length}열 · ${(size/1024).toFixed(1)}KB`;
    document.getElementById('uploadZone').classList.add('loaded');

    // Stats
    document.getElementById('statRows').textContent = csvData.length.toLocaleString();
    document.getElementById('statCols').textContent = headers.length;
    document.getElementById('statPoints').textContent = (csvData.length * headers.length).toLocaleString();
    document.getElementById('statsRow').style.display = 'grid';

    // Table
    renderTable();

    // Chart
    renderChart();

    // Enable ask
    document.getElementById('askBtn').disabled = false;
    document.getElementById('dataGrid').style.display = 'grid';
    document.getElementById('aiPanel').style.display = 'block';
  }

  function renderTable() {
    const preview = csvData.slice(0, 10);
    let html = '<table><thead><tr>';
    headers.forEach(h => { html += `<th>${h}</th>`; });
    html += '</tr></thead><tbody>';
    preview.forEach(row => {
      html += '<tr>';
      headers.forEach(h => { html += `<td title="${row[h]}">${row[h]}</td>`; });
      html += '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('tableWrap').innerHTML = html;
  }

  function renderChart() {
    // Find a numeric column for charting
    const numericCol = headers.find(h => {
      const vals = csvData.map(r => parseFloat(r[h])).filter(v => !isNaN(v));
      return vals.length > csvData.length * 0.5;
    });

    const labelCol = headers.find(h => h !== numericCol);
    if (!numericCol) {
      document.getElementById('chartArea').innerHTML = '<div class="empty-panel">수치 데이터를 감지하지 못했습니다</div>';
      return;
    }

    const items = csvData
      .map(r => ({ label: r[labelCol] || '—', value: parseFloat(r[numericCol]) }))
      .filter(i => !isNaN(i.value))
      .sort((a, b) => b.value - a.value)
      .slice(0, 8);

    const max = Math.max(...items.map(i => i.value));

    const colors = ['#58a6ff','#3fb950','#f78166','#d2a8ff','#79c0ff','#56d364','#ffa657','#ff7b72'];

    document.getElementById('chartBadge').textContent = `${numericCol} 상위 ${items.length}`;

    let html = '';
    items.forEach((item, i) => {
      const pct = Math.round((item.value / max) * 100);
      const val = item.value >= 10000 ? (item.value/10000).toFixed(1) + '만' : item.value.toLocaleString();
      html += `
        <div class="chart-row">
          <div class="chart-label" title="${item.label}">${item.label}</div>
          <div class="chart-bar-wrap">
            <div class="chart-bar-fill" style="width:${pct}%; background:${colors[i%colors.length]};">${val}</div>
          </div>
        </div>
      `;
    });

    document.getElementById('chartArea').innerHTML = html;
  }

  function setQuestion(q) {
    document.getElementById('askInput').value = q;
    document.getElementById('askInput').focus();
  }

  async function askQuestion() {
    if (!csvData.length) { alert('먼저 CSV 파일을 업로드하세요.'); return; }
    const question = document.getElementById('askInput').value.trim();
    if (!question) { alert('분석할 질문을 입력해주세요.'); return; }

    const btn = document.getElementById('askBtn');
    btn.disabled = true;
    document.getElementById('askBtnSpinner').style.display = 'inline-flex';

    document.getElementById('aiQuestion').textContent = question;
    document.getElementById('aiOutput').innerHTML = '<div class="empty-panel">분석 중...</div>';

    // Prepare data summary for context
    const dataSample = csvData.slice(0, 50);
    const csvSample = [headers.join(','), ...dataSample.map(r => headers.map(h => r[h]).join(','))].join('\n');

    const prompt = `당신은 데이터 분석 전문가입니다. 아래 CSV 데이터를 분석하고 질문에 답하세요.

[데이터 정보]
- 총 행 수: ${csvData.length}
- 컬럼: ${headers.join(', ')}

[데이터 샘플 (최대 50행)]
${csvSample}

[사용자 질문]
${question}

[답변 지침]
- 구체적인 수치와 예시를 포함하여 답하세요.
- 한국어로 명확하고 실용적으로 답하세요.
- 각 섹션은 "### 섹션명" 형식으로 구분하세요.
- 인사이트와 제언이 있다면 포함하세요.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();
      const text = data.content.map(b => b.text || '').join('');

      // Render with sections
      const sections = text.split(/###\s+(.+)/);
      let html = '';

      if (sections.length <= 1) {
        html = `<div class="ai-section"><div class="ai-section-body">${text}</div></div>`;
      } else {
        const icons = ['📌','📈','🔍','💡','⚠️','✅'];
        let iconIdx = 0;
        for (let i = 1; i < sections.length; i += 2) {
          const title = sections[i];
          const body = sections[i+1]?.trim() || '';
          html += `
            <div class="ai-section">
              <div class="ai-section-title">${icons[iconIdx++ % icons.length]} ${title}</div>
              <div class="ai-section-body">${body}</div>
            </div>
          `;
        }
        if (sections[0].trim()) {
          html = `<div class="ai-section"><div class="ai-section-body">${sections[0].trim()}</div></div>` + html;
        }
      }

      document.getElementById('aiOutput').innerHTML = html;
      document.getElementById('aiOutput').classList.add('fade-in');

    } catch(err) {
      document.getElementById('aiOutput').innerHTML = `<div class="empty-panel">오류: ${err.message}</div>`;
    }

    btn.disabled = false;
    document.getElementById('askBtnSpinner').style.display = 'none';
  }

  // Enter to ask
  document.getElementById('askInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') askQuestion();
  });
</script>
