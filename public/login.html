<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Works Hub — 로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0d;
      --card: #17171d;
      --border: #252530;
      --text: #e0e0ec;
      --muted: #555568;
      --acc: #6c63ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 340px;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: .06em;
      background: linear-gradient(135deg, #fff 0%, #6c63ff 60%, #43e09f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .sub {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--acc); }
    button {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      background: var(--acc);
      border: none;
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: filter .15s;
    }
    button:hover { filter: brightness(1.15); }
    .error {
      font-size: 11px;
      color: #ff6b6b;
      margin-top: 10px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">WORKS HUB</div>
    <div class="sub">접근하려면 비밀번호를 입력하세요</div>
    <label>Password</label>
    <input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">로그인</button>
    <div class="error" id="err">비밀번호가 틀렸어요</div>
  </div>
  <script>
    async function login() {
      const pw = document.getElementById('pw').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const data = await res.json();
      if (data.ok) {
        location.href = '/';
      } else {
        document.getElementById('err').style.display = 'block';
      }
    }
  </script>
</body>
</html>
